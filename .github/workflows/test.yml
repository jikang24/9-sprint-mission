name: CI

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: discodeit
          POSTGRES_USER: discodeit_user
          POSTGRES_PASSWORD: discodeit1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Initialize database schema
        run: |
          PGPASSWORD=discodeit1234 psql \
            -h localhost \
            -U discodeit_user \
            -d discodeit \
            -f discodeit/src/main/resources/schema.sql   
          # 실행 결과 확인을 위해 추가
        continue-on-error: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: discodeit

      - name: Run tests
        run: ./gradlew test jacocoTestReport --no-daemon
        working-directory: discodeit
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/discodeit
          SPRING_DATASOURCE_USERNAME: discodeit_user
          SPRING_DATASOURCE_PASSWORD: discodeit1234

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: discodeit/build/reports/jacoco/test/jacocoTestReport.xml
