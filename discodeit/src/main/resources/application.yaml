spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량
  #  datasource:
  #    driver-class-name: org.postgresql.Driver
  #    url: jdbc:postgresql://localhost:5432/discodeit
  #    username: discodeit_user
  #    password: discodeit1234
  jpa:
    #    hibernate:
    #      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    #        default_batch_fetch_size: 100
    open-in-view: false
  boot:
    admin:
      client:
        instance:
          name: discodeit

  profiles:
    active: dev  # 기본값은 dev로 설정

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  info:
    env:
      enabled: true


logging:
  level:
    root: info
#    org.hibernate.SQL: debug
#    org.hibernate.orm.jdbc.bind: trace
#
#discodeit:
#  storage:
#    type: local
#    local:
#      root-path: .discodeit/storage
info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.4.0
  datasource:
    url: ${spring.datasource.url}                           # dev/prod yaml에서 참조
    driver-class-name: ${spring.datasource.driver-class-name}
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto}             # dev/prod yaml에서 참조
  storage:
    type: ${discodeit.storage.type}                        # dev/prod yaml에서 참조
    path: ${discodeit.storage.local.root-path}
  multipart:
    max-file-size: ${spring.servlet.multipart.maxFileSize}  # 공통 yaml에 있음
    max-request-size: ${spring.servlet.multipart.maxRequestSize}