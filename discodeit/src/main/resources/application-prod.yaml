server:
  port: 80  # 운영용 포트

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    hibernate:
      ddl-auto: validate  # 운영에선 절대 테이블 건드리지 않음

logging:
  level:
    root: info
    org.hibernate.SQL: warn  # 운영에선 로그 최소화
    com.sprint.misson.discodeit: info

discodeit:
  storage:
    type: local  # 나중에 S3 등으로 바꿀 수 있음
    local:
      root-path: /var/discodeit/storage