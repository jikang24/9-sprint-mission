server:
  port: 8080  # 개발용 포트

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    hibernate:
      ddl-auto: validate  # 개발에선 테이블 자동 생성
  boot:
    admin:
      client:
        url: http://localhost:9090

logging:
  level:
    root: info
    org.hibernate.SQL: debug     # 개발에선 SQL 로그 상세히 봄
    org.hibernate.orm.jdbc.bind: trace
    com.sprint.mission.discodeit: debug

discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage