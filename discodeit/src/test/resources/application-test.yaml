spring:
  datasource:
    # H2 인메모리 DB - PostgreSQL 호환 모드로 설정
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create  # 테스트 시작 시 스키마 새로 생성
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never  # SQL 초기화 스크립트 비활성화

logging:
  level:
    org.hibernate.SQL: debug                  # 실행되는 SQL 확인
    org.hibernate.orm.jdbc.bind: trace        # 바인딩 파라미터 확인
    org.springframework.test: info
discodeit:
  storage:
    type: local
    local:
      root-path: ./test-storage
